openapi: 3.1.0
info:
  title: Dots Webhooks
  version: 1.0.0
webhooks:
  payment_intent.updated:
    post:
      operationId: payment_intent.updated
      summary: payment_intent.updated
      description: A payment intent object was updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentIntentUpdatedWebhook'
      responses:
        '200':
          description: Return any 2xx status code to acknowledge receipt of the webhook
            event.
  payment_method.updated:
    post:
